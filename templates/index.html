<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden of Thorn 荆棘花园</title>
<link rel="stylesheet" href="/static/css/style.css?v=50">
</head>
<body>
<div id="app">
<div id="boot-loader" class="boot-loader">
  <div class="boot-loader-inner">
    <div class="boot-title">Garden of Thorn</div>
    <div class="boot-sub">启动中</div>
    <div id="boot-step" class="boot-step">准备加载...</div>
    <div class="boot-progress">
      <div id="boot-progress-fill" class="boot-progress-fill"></div>
    </div>
  </div>
</div>

<div id="view-login" class="view">
<div class="login-container">
<h1 class="title-main">Garden of Thorn</h1>
<h2 class="title-sub">荆棘花园</h2>
<p class="subtitle">局域网联机卡牌对战</p>
<div class="login-form">
<div class="form-row">
<label for="input-nickname">昵称</label>
<input type="text" id="input-nickname" maxlength="16" placeholder="输入昵称">
</div>
<div class="form-row">
<button id="btn-connect" class="btn btn-primary">进入大厅</button>
</div>
<div class="form-row">
<button id="btn-solo-training" class="btn btn-magic">单人训练场</button>
</div>
<div class="form-row">
<button id="btn-open-settings" class="btn-settings">设置</button>
</div>
</div>
<p id="login-error" class="error-text"></p>
</div>
</div>

<div id="view-solo" class="view hidden">
<div class="solo-container">
  <div class="solo-header">
    <h2 id="solo-title">单人训练场</h2>
    <div class="solo-actions">
      <button id="btn-solo-load" class="btn btn-secondary">载入上次</button>
      <button id="btn-solo-save" class="btn btn-bloom">保存牌堆</button>
      <button id="btn-solo-start" class="btn btn-primary">开始训练</button>
      <button id="btn-solo-back" class="btn btn-secondary">返回</button>
    </div>
  </div>
  <div class="solo-builder">
    <aside class="solo-card-browser">
      <input id="solo-card-search" type="text" placeholder="搜索卡牌">
      <div id="solo-card-list" class="solo-card-list"></div>
    </aside>
    <section class="solo-deck-panel">
      <div class="solo-deck-head">
        <h3 id="solo-deck-a-title">我方牌堆</h3>
        <span id="solo-deck-a-count">0/15</span>
      </div>
      <div id="solo-deck-a" class="solo-deck-list"></div>
    </section>
    <section class="solo-deck-panel">
      <div class="solo-deck-head">
        <h3 id="solo-deck-b-title">对方牌堆</h3>
        <span id="solo-deck-b-count">0/15</span>
      </div>
      <div id="solo-deck-b" class="solo-deck-list"></div>
    </section>
  </div>
  <div class="solo-events">
    <div class="solo-event-panel">
      <label for="solo-event-a" id="solo-event-a-label">我方开局事件</label>
      <select id="solo-event-a"></select>
    </div>
    <div class="solo-event-panel">
      <label for="solo-event-b" id="solo-event-b-label">对方开局事件</label>
      <select id="solo-event-b"></select>
    </div>
  </div>
</div>
</div>

<div id="view-lobby" class="view hidden">
<div class="lobby-container">
<div class="lobby-header">
<h2>大厅</h2>
</div>
<div class="lobby-body">
<div class="lobby-left">
<div class="lobby-section">
<h3>在线玩家</h3>
<div id="lobby-players" class="player-list"></div>
<p id="lobby-online-count" class="info-text">在线人数: 0</p>
</div>
<div class="lobby-section">
<h3>正在进行的对局</h3>
<div id="lobby-games" class="game-list"></div>
</div>
</div>
<div class="lobby-right">
<div class="lobby-section lobby-chat">
<h3>聊天</h3>
<div id="lobby-chat-log" class="lobby-chat-log"></div>
<div class="chat-input-row">
<input type="text" id="lobby-chat-input" placeholder="输入消息..." maxlength="200">
<button id="btn-lobby-chat-send" class="btn btn-small">发送</button>
</div>
</div>
</div>
</div>
<div class="lobby-footer">
<button id="btn-lobby-back" class="btn btn-secondary">返回主页</button>
</div>
</div>
</div>

<div id="view-draft" class="view hidden">
<div class="draft-container">
<h2>选牌阶段</h2>
<p id="draft-info" class="info-text"></p>
<div id="draft-options" class="draft-options"></div>
<div id="draft-picks" class="draft-picks"></div>
<button id="btn-draft-reroll" class="btn btn-magic">重选</button>
</div>
</div>

<div id="view-event-select" class="view hidden">
<div class="event-container">
<h2>选择开局事件</h2>
<p class="event-desc">选择一个事件影响本局游戏</p>
<div id="event-options" class="event-options"></div>
</div>
</div>

<div id="view-game" class="view hidden">
<div class="game-container">
  <div class="opp-section">
    <div class="player-info-bar">
      <span id="opp-label" class="player-label opp-label">对手</span>
      <div id="opp-bars" class="bars-row"></div>
      <div id="opp-status" class="status-tags"></div>
      <span id="opp-info" class="info-extra">手牌:0 牌堆:0</span>
    </div>
    <div class="opp-hand-equip">
      <div id="opp-hand" class="opp-hand-row"></div>
      <div id="opp-equip" class="equip-row"></div>
    </div>
  </div>
  <div class="middle-section">
    <div id="battle-log" class="battle-log">
      <div class="log-header">战斗日志</div>
      <div class="log-content"></div>
    </div>
  </div>
  <div class="player-section">
    <div class="player-info-bar">
      <span id="you-label" class="player-label you-label">你</span>
      <div id="you-bars" class="bars-row"></div>
      <div id="you-status" class="status-tags"></div>
      <span id="you-info" class="info-extra">手牌:0 牌堆:0 弃牌:0</span>
    </div>
    <div id="you-equip" class="equip-row"></div>
    <div class="hand-play-row">
      <div id="you-hand" class="hand-area"></div>
      <div id="play-zone" class="play-zone">
        <span class="play-zone-hint">拖牌至此</span>
      </div>
    </div>
    <div class="controls-bar">
      <div id="game-controls" class="controls-group">
        <button id="btn-end-turn" class="btn btn-danger btn-end-turn">结束回合</button>
        <button id="btn-view-deck" class="btn btn-magic btn-view-deck">查看牌堆</button>
        <button id="btn-solo-next-draw" class="btn btn-magic hidden">设置下次抽牌</button>
        <button id="btn-solo-edit" class="btn btn-secondary hidden">暂停编辑</button>
        <button id="btn-surrender" class="btn btn-secondary btn-surrender">投降</button>
      </div>
      <div id="spectate-controls" class="controls-group hidden">
        <button id="btn-switch-perspective" class="btn btn-magic btn-switch-perspective">切换视角</button>
        <button id="btn-leave-spectate" class="btn btn-danger btn-leave-spectate">退出观战</button>
      </div>
      <div class="controls-group controls-right">
        <input type="text" id="game-chat-input" placeholder="聊天..." maxlength="200">
        <button id="btn-game-chat-send" class="btn btn-small">发送</button>
      </div>
    </div>
  </div>
  <div id="response-panel" class="response-panel hidden"></div>
</div>
</div>

<div id="view-gameover" class="view hidden">
<div class="gameover-container">
<h1 id="gameover-title" class="gameover-text"></h1>
<div id="gameover-log" class="gameover-log"></div>
<div class="gameover-buttons">
<button id="btn-rematch" class="btn btn-bloom">再来一局</button>
<button id="btn-return-lobby" class="btn btn-secondary">返回大厅</button>
</div>
</div>
</div>

<div id="view-mod-editor" class="view hidden">
<div class="mod-editor-container">
<h2>模组编辑器</h2>
<div class="mod-editor-body">
<textarea id="mod-editor-area" class="mod-textarea" spellcheck="false" placeholder="在此粘贴或编辑模组JSON..."></textarea>
</div>
<div class="mod-editor-footer">
<button id="btn-mod-load" class="btn btn-primary">加载模组</button>
<button id="btn-mod-save" class="btn btn-bloom">保存</button>
<button id="btn-mod-validate" class="btn btn-magic">验证JSON</button>
<button id="btn-mod-back" class="btn btn-secondary">返回</button>
<span id="mod-editor-status" class="mod-status"></span>
</div>
</div>
</div>

<div id="settings-panel" class="settings-panel hidden">
<div class="settings-inner">
<h3 id="settings-title">设置</h3>
<div class="settings-section">
<h4 id="settings-section-appearance">外观</h4>
<div class="settings-theme-row">
<label id="settings-label-theme">主题</label>
<select id="settings-theme-select">
<option value="light">明亮</option>
<option value="dark">黑暗</option>
</select>
</div>
<div class="settings-lang-row">
<label id="settings-label-lang">语言</label>
<select id="settings-lang-select">
<option value="zh">简体中文</option>
<option value="en">English (US)</option>
<option value="fr">Français</option>
<option value="pt">Português (Brasil)</option>
<option value="ru">Русский</option>
<option value="ja">日本語</option>
</select>
</div>
</div>
<div class="settings-section">
<h4 id="settings-section-server">服务器</h4>
<div class="settings-theme-row">
<label id="settings-label-server">地址</label>
<input type="text" id="settings-server-input" placeholder="留空使用默认服务器">
</div>
<p id="settings-server-hint" class="info-text" style="font-size:11px;margin-top:4px;"></p>
</div>
<div class="settings-section">
<h4 id="settings-section-mods">模组</h4>
<div id="settings-mods-list" class="settings-mods-list"></div>
<p id="settings-no-mods" class="info-text">未找到模组文件</p>
</div>
<div class="settings-footer">
<button id="btn-settings-close" class="btn btn-primary">确定</button>
</div>
</div>
</div>

<div id="game-alert" class="game-alert">
<div class="game-alert-inner">
<div id="game-alert-icon" class="game-alert-icon"></div>
<div id="game-alert-title" class="game-alert-title"></div>
<div id="game-alert-message" class="game-alert-message"></div>
<div id="game-alert-buttons" class="game-alert-buttons"></div>
</div>
</div>

<div id="game-prompt" class="game-prompt">
<div class="game-prompt-inner">
<div id="game-prompt-title" class="game-prompt-title"></div>
<div id="game-prompt-options" class="game-prompt-options"></div>
<div class="game-prompt-buttons">
<button id="game-prompt-cancel" class="btn btn-secondary">取消</button>
</div>
</div>
</div>

<div id="modal" class="modal">
<div id="modal-content" class="modal-inner"></div>
</div>

<div id="rotate-hint" class="rotate-hint">
  <div class="rotate-hint-inner">
    <div class="rotate-icon">📱↔</div>
    <div class="rotate-text">请横屏游玩</div>
    <div class="rotate-text-en">Rotate to Landscape</div>
    <button id="btn-dismiss-rotate" class="btn btn-secondary" style="margin-top:16px;">继续进入</button>
  </div>
</div>

<div class="status-bar">
<span id="status-text">Garden of Thorn 荆棘花园</span>
</div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/static/js/game.js?v=50"></script>
</body>
</html>
