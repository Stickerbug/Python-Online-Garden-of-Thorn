name: Deploy GTN to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          HOST: ${{ secrets.ALIYUN_HOST }}
          USER: ${{ secrets.ALIYUN_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$USER@$HOST" 'bash -s' << 'EOF'
            set -e

            flock /tmp/gtn-deploy.lock bash -c '
              cd /opt/gtn

              git fetch origin main
              git reset --hard origin/main

              source venv/bin/activate
              pip install -r requirements.txt

              systemctl restart gtn
              systemctl status gtn --no-pager
            '
          EOF