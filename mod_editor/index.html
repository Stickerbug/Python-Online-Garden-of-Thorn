<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden of Thorn | 模组编辑器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="menubar">
      <div class="menu-left">
        <span class="menu-brand">Garden of Thorn 模组编辑器</span >
        <div class="menu-item" id="menu-file">
          文件
          <div class="menu-dropdown">
            <div class="menu-option" id="btn-new-mod">新建模组</div>
            <div class="menu-option" id="btn-open-mod">打开模组 JSON...</div>
            <div class="menu-option" id="btn-save-mod">保存模组 JSON</div>
            <div class="menu-option" id="btn-export-mod">导出模组 JSON...</div>
            <div class="menu-separator"></div>
            <div class="menu-option" id="btn-import-card">导入卡牌 JSON...</div>
          </div>
        </div>
        <div class="menu-item" id="menu-mod-info">
          模组信息
          <div class="menu-dropdown">
            <div class="menu-option" id="btn-edit-info">编辑模组信息</div>
            <div class="menu-option" id="btn-edit-globals">编辑全局设置</div>
          </div>
        </div>
        <div class="menu-item" id="btn-json-preview">JSON 预览</div>
      </div>
      <div class="menu-right">
        <span id="mod-name-display">未命名模组</span>
      </div>
    </div>

    <div id="workspace-container">
      <div id="blockly-area"></div>
      <div id="right-panel">
        <div id="card-list-panel">
          <div class="panel-header">
            <span>卡牌列表</span>
            <div class="panel-actions">
              <button class="btn-icon" id="btn-add-card" title="新建卡牌">＋</button>
              <button class="btn-icon" id="btn-duplicate-card" title="复制卡牌">⧉</button>
              <button class="btn-icon" id="btn-delete-card" title="删除卡牌">✕</button>
            </div>
          </div>
          <div id="card-list"></div>
        </div>
        <div id="card-props-panel">
          <div class="panel-header">卡牌属性</div>
          <div id="card-props">
            <div class="prop-row">
              <label>ID</label>
              <input type="text" id="prop-id" placeholder="CardID">
            </div>
            <div class="prop-row">
              <label>中文名</label>
              <input type="text" id="prop-name-cn" placeholder="卡牌名称">
            </div>
            <div class="prop-row">
              <label>英文名</label>
              <input type="text" id="prop-name-en" placeholder="Card Name">
            </div>
            <div class="prop-row-double">
              <div class="prop-half">
                <label>能量消耗</label>
                <input type="number" id="prop-cost-e" min="0" value="0">
              </div>
              <div class="prop-half">
                <label>魔力消耗</label>
                <input type="number" id="prop-cost-m" min="0" value="0">
              </div>
            </div>
            <div class="prop-row">
              <label>卡牌类型</label>
              <select id="prop-card-type">
                <option value="thorn">攻击</option>
                <option value="bloom">技能</option>
                <option value="root">装备</option>
                <option value="guard">反制</option>
              </select>
            </div>
            <div class="prop-row">
              <label>品质</label>
              <select id="prop-quality">
                <option value="Common">Common</option>
                <option value="Unusual">Unusual</option>
                <option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option>
                <option value="Epic">Epic</option>
                <option value="Ultra">Ultra</option>
                <option value="Super">Super</option>
              </select>
            </div>
            <div class="prop-row">
              <label>标签</label>
              <div id="prop-flags" class="flags-container">
                <label class="flag-checkbox"><input type="checkbox" value="exile">放逐</label>
                <label class="flag-checkbox"><input type="checkbox" value="non_stackable">不可叠加</label>
                <label class="flag-checkbox"><input type="checkbox" value="precision">精准</label>
                <label class="flag-checkbox"><input type="checkbox" value="indestructible">不可摧毁</label>
                <label class="flag-checkbox"><input type="checkbox" value="sprout">萌芽</label>
                <label class="flag-checkbox"><input type="checkbox" value="symbiosis">共生</label>
              </div>
            </div>
            <div class="prop-row">
              <label>效果文本</label>
              <input type="text" id="prop-effect-text" placeholder="效果简述">
            </div>
            <div class="prop-row">
              <label>描述</label>
              <textarea id="prop-description" rows="3" placeholder="卡牌描述"></textarea>
            </div>
            <div class="prop-row-double">
              <div class="prop-half">
                <label>耐久</label>
                <input type="number" id="prop-durability" min="-1" value="-1">
              </div>
              <div class="prop-half">
                <label>堆叠上限</label>
                <input type="number" id="prop-max-copies" min="1" value="99">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span id="status-current-card">当前编辑：无</span>
      <span id="status-effect-count">效果数量：0</span>
      <span id="status-hint">拖拽积木到工作区开始编辑</span>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content">
      <div class="modal-header">
        <span id="modal-title">标题</span>
        <button class="btn-icon" id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
